<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>I2P Knoks Guardian</title><style>body{font:16px system-ui;background:#0b1014;color:#eaf3ef;margin:0}.wrap{max-width:900px;margin:auto;padding:32px}.card{background:#151d22;border:1px solid #2b3940;border-radius:16px;padding:20px;margin:16px 0}button{padding:10px 16px;margin:4px;border:0;border-radius:10px;cursor:pointer}.danger{background:#d64b4b;color:white}.ok{color:#70e0a3}.muted{color:#9fb0b8}pre{white-space:pre-wrap;max-height:320px;overflow:auto}</style></head><body><main class="wrap"><h1>I2P Knoks Guardian</h1><p class="muted">Local-only I2P process supervision and health control.</p><section class="card"><h2 id="state">Loading…</h2><div id="details"></div><p><button onclick="act('start')">Start</button><button onclick="act('restart')">Restart</button><button onclick="act('stop')">Stop</button><button class="danger" onclick="lockdown()">Lockdown</button></p></section><section class="card"><h3>Recent logs</h3><pre id="logs"></pre></section></main><script>let token=sessionStorage.token||prompt('Guardian API token (stored in ~/.i2p-knoks/api-token):')||'';sessionStorage.token=token;const h={Authorization:'Bearer '+token,'Content-Type':'application/json'};async function api(path,opt={}){const r=await fetch('/v1/'+path,{...opt,headers:h});if(!r.ok)throw Error(await r.text());return r.json()}async function refresh(){try{const s=await api('status');state.textContent=s.state.toUpperCase();state.className=s.state==='connected'?'ok':'';details.innerHTML=`PID: ${s.pid??'—'} · Uptime: ${s.uptimeSeconds}s · Restarts: ${s.restarts}<br>Console ${s.endpoints.console?'✓':'—'} · HTTP ${s.endpoints.httpProxy?'✓':'—'} · SOCKS ${s.endpoints.socksProxy?'✓':'—'} · SAM ${s.endpoints.sam?'✓':'—'}`;const l=await api('logs');logs.textContent=l.logs.map(x=>`${x.at} ${x.level.toUpperCase()} ${x.message}`).join('\n')}catch(e){state.textContent='AUTHENTICATION OR SERVICE ERROR';details.textContent=e.message}}async function act(x){await api('router/'+x,{method:'POST'});refresh()}async function lockdown(){await api('lockdown',{method:'POST',body:JSON.stringify({enabled:true})});refresh()}refresh();setInterval(refresh,5000)</script></body></html>
