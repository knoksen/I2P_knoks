name: Android

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM core-flow tests
        run: ./gradlew testDebugUnitTest

      - name: Upload JVM test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: i2p-knoks-jvm-test-reports
          path: app/build/reports/tests/
          if-no-files-found: ignore

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Generate SHA-256 checksum for debug APK
        run: |
          sha256sum app/build/outputs/apk/debug/*.apk | tee app/build/outputs/apk/debug/app-debug.apk.sha256
          echo "APK_SHA256=$(awk '{print $1}' app/build/outputs/apk/debug/app-debug.apk.sha256)" >> "$GITHUB_ENV"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: i2p-knoks-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload debug APK checksum
        uses: actions/upload-artifact@v4
        with:
          name: i2p-knoks-debug-apk-sha256
          path: app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error

      - name: Write debug APK summary
        run: |
          {
            echo "## I2P Knoks Debug APK"
            echo ""
            echo "- JVM tests: \`testDebugUnitTest\`"
            echo "- Test matrix: \`docs/ANDROID_REAL_ALPHA_TEST_MATRIX.md\`"
            echo "- Artifact: \`i2p-knoks-debug-apk\`"
            echo "- Checksum artifact: \`i2p-knoks-debug-apk-sha256\`"
            echo "- SHA-256: \`${APK_SHA256}\`"
            echo "- Build type: debug"
            echo "- Intended use: real-alpha testing only"
            echo "- Not production signed"
            echo "- Not a Play Store release"
            echo "- Does not depend on public I2P availability or live external routers"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "To verify the downloaded APK, download the \`i2p-knoks-debug-apk-sha256\` artifact and run:"
            echo ""
            echo '```'
            echo "sha256sum -c app-debug.apk.sha256"
            echo '```'
            echo ""
            echo "Use this artifact together with docs/REAL_DEVICE_TESTING.md and docs/RELEASE_PROCESS.md."
          } >> "$GITHUB_STEP_SUMMARY"

  migration-instrumentation:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Record Android SDK diagnostics
        run: |
          mkdir -p app/build/reports/room-migration-ci
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --list_installed | tee app/build/reports/room-migration-ci/sdkmanager-installed.txt || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/avdmanager" list device | tee app/build/reports/room-migration-ci/avdmanager-devices.txt || true

      - name: Run Room migration instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_2
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          script: |
            set -u
            mkdir -p app/build/reports/room-migration-ci
            adb devices -l | tee app/build/reports/room-migration-ci/adb-devices.txt
            adb shell getprop sys.boot_completed | tee app/build/reports/room-migration-ci/boot-completed.txt
            adb shell getprop ro.build.version.release | tee app/build/reports/room-migration-ci/android-release.txt
            adb shell getprop ro.product.cpu.abi | tee app/build/reports/room-migration-ci/android-abi.txt
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            adb logcat -c
            test_exit=0
            ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=no.knoksen.i2pbrowser.AppDatabaseMigrationInstrumentedTest 2>&1 | tee app/build/reports/room-migration-ci/gradle-output.txt || test_exit=${PIPESTATUS[0]}
            adb logcat -d > app/build/reports/room-migration-ci/logcat.txt || true
            exit "$test_exit"

      - name: Upload Room migration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-migration-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
            app/build/reports/room-migration-ci/gradle-output.txt
          if-no-files-found: ignore

      - name: Upload Room migration Logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-migration-logcat
          path: app/build/reports/room-migration-ci/logcat.txt
          if-no-files-found: ignore

      - name: Upload Room migration emulator diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: room-migration-emulator-diagnostics
          path: |
            app/build/reports/room-migration-ci/adb-devices.txt
            app/build/reports/room-migration-ci/boot-completed.txt
            app/build/reports/room-migration-ci/android-release.txt
            app/build/reports/room-migration-ci/android-abi.txt
            app/build/reports/room-migration-ci/sdkmanager-installed.txt
            app/build/reports/room-migration-ci/avdmanager-devices.txt
          if-no-files-found: ignore
