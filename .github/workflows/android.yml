name: Android

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: i2p-knoks-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Write debug APK summary
        run: |
          {
            echo "## I2P Knoks Debug APK"
            echo ""
            echo "- Artifact: \`i2p-knoks-debug-apk\`"
            echo "- Build type: debug"
            echo "- Intended use: real-alpha testing only"
            echo "- Not production signed"
            echo "- Not a Play Store release"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "Use this artifact together with docs/REAL_DEVICE_TESTING.md and docs/RELEASE_PROCESS.md."
          } >> "$GITHUB_STEP_SUMMARY"
