name: Draft Real Alpha Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.3.8-release-packaging"
        required: true
        type: string
      title:
        description: "GitHub release title"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  draft-release:
    name: Build debug APK and draft release
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check release-facing claims
        shell: pwsh
        run: ./scripts/check-release-claims.ps1

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Generate SHA-256 checksum for debug APK
        run: |
          sha256sum app/build/outputs/apk/debug/*.apk | tee app/build/outputs/apk/debug/app-debug.apk.sha256
          echo "APK_SHA256=$(awk '{print $1}' app/build/outputs/apk/debug/app-debug.apk.sha256)" >> "$GITHUB_ENV"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: i2p-knoks-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload debug APK checksum
        uses: actions/upload-artifact@v4
        with:
          name: i2p-knoks-debug-apk-sha256
          path: app/build/outputs/apk/debug/app-debug.apk.sha256
          if-no-files-found: error

      - name: Create release notes
        shell: pwsh
        run: |
          @'
          # ${{ inputs.title }}

          ## Summary

          Real-alpha release draft for I2P Knoks Browser.

          ## Real

          - External endpoint setup, diagnostics, SAM probing, and HTTP proxy page inspection.

          ## Still LAB

          - Full WebView browsing, VPN, Tor, secure chat, peer discovery, and embedded router modes.

          ## Verification

          - Release-facing claim check passed in GitHub Actions.
          - `testDebugUnitTest` passed in GitHub Actions.
          - `assembleDebug` passed in GitHub Actions.

          ## APK Artifact

          - Artifact: `i2p-knoks-debug-apk`
          - Checksum artifact: `i2p-knoks-debug-apk-sha256`
          - SHA-256: `SHA256_PLACEHOLDER`
          - Build type: debug
          - Intended use: real-alpha testing only
          - Not production signed
          - Not a Play Store release

          ## Checksum Verification

          Download the `i2p-knoks-debug-apk-sha256` artifact and run:

          ```
          sha256sum -c app-debug.apk.sha256
          ```

          On Windows (PowerShell):

          ```powershell
          (Get-FileHash app-debug.apk -Algorithm SHA256).Hash
          ```

          Compare the output against the SHA-256 value listed above.

          ## Known Limits

          - No embedded I2P router
          - No WebView/full browser
          - No JavaScript execution
          - No VPN
          - No Tor
          - No secure chat

          ## Non-goals

          - Production signing
          - Play Store publishing
          - Anonymous browsing guarantees
          '@ -replace 'SHA256_PLACEHOLDER', $env:APK_SHA256 | Set-Content -Path release-notes.md -Encoding utf8

      - name: Draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_args=(
            "${{ inputs.tag }}"
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/app-debug.apk.sha256
            --title "${{ inputs.title }}"
            --notes-file release-notes.md
            --draft
          )

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"

      - name: Write release summary
        run: |
          {
            echo "## I2P Knoks Draft Release"
            echo ""
            echo "- Tag: \`${{ inputs.tag }}\`"
            echo "- Title: \`${{ inputs.title }}\`"
            echo "- Artifact: \`i2p-knoks-debug-apk\`"
            echo "- Checksum artifact: \`i2p-knoks-debug-apk-sha256\`"
            echo "- SHA-256: \`${APK_SHA256}\`"
            echo "- Build type: debug"
            echo "- Intended use: real-alpha testing only"
            echo "- Draft release created: yes"
            echo "- Not production signed"
            echo "- Not a Play Store release"
          } >> "$GITHUB_STEP_SUMMARY"
